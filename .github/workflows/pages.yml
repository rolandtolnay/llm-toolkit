name: Deploy site to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "site/**"
      - "docs/vocabulary-activation.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy published docs into site
        run: |
          printf -- '---\nlayout: default\ntitle: Vocabulary Activation Reference\n---\n\n' > site/vocabulary-activation.md
          cat docs/vocabulary-activation.md >> site/vocabulary-activation.md

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./site
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
